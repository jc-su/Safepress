# Gemma-2-9B-it G2 pilot — 4th model in the panel.
# Strong-aligned 9B chat baseline; tests whether Fisher>SSMP holds on the
# Gemma family (different alignment recipe from Qwen / Llama / Mistral).

model_id: google/gemma-2-9b-it
model_tag: gemma2_9b_3bit_g2pilot

out_root: runs/emnlp_g2_pilot_gemma
summary_csv: runs/emnlp_g2_pilot_gemma/sweep_summary.csv

safety_prompts: data/advbench.jsonl
eval_prompts: data/harmbench.jsonl
utility_prompts: data/dolly.jsonl
prompt_key: prompt
max_prompts: 400

seeds: [0]
deterministic: true

methods:
  - fp16
  - int4
  - ssmp
  - gradient_only
  - snip
  - magnitude

budgets: [0.04, 0.08]

bits: 3
group_size: 128
block_size: 64
batch_size: 1
max_length: 1024

max_new_tokens: 256
temperature: 0.0
top_p: 1.0
do_sample: false

use_harmbench_classifier: false
try_strongreject: false

last_n_layers: 4
cwp_beta: 1.0
refusal_template: "I'm sorry, but I can't help with that."
