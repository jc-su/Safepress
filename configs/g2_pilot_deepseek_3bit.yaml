# DeepSeek-R1-Distill-Llama-8B G2 pilot — 5th model.
# Llama-3 backbone + DeepSeek reasoning distillation. Tests whether a
# different alignment recipe on a familiar tokenizer changes the result.

model_id: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
model_tag: deepseek_r1_distill_llama_8b_3bit_g2pilot

out_root: runs/emnlp_g2_pilot_deepseek
summary_csv: runs/emnlp_g2_pilot_deepseek/sweep_summary.csv

safety_prompts: data/advbench.jsonl
eval_prompts: data/harmbench.jsonl
utility_prompts: data/dolly.jsonl
prompt_key: prompt
max_prompts: 400

seeds: [0]
deterministic: true

methods:
  - fp16
  - int4
  - ssmp
  - gradient_only
  - snip
  - magnitude

budgets: [0.04, 0.08]

bits: 3
group_size: 128
block_size: 64
batch_size: 1
max_length: 1024

max_new_tokens: 256
temperature: 0.0
top_p: 1.0
do_sample: false

use_harmbench_classifier: false
try_strongreject: false

last_n_layers: 4
cwp_beta: 1.0
refusal_template: "I'm sorry, but I can't help with that."
