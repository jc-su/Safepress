    family: qwen
    size: 8B
    n_layers: 36
    hidden_dim: 4096

  # ── Secondary (community standard for safety research) ──
  llama-3.1-8b:
    id: meta-llama/Llama-3.1-8B-Instruct
    family: llama
    size: 8B
