    family: gemma
    size: 4B
    n_layers: 34
    hidden_dim: 2560

  # ── Smaller ablation ──
  qwen2.5-3b:
    id: Qwen/Qwen2.5-3B-Instruct
    family: qwen
    size: 3B
    n_layers: 36
    hidden_dim: 2048
